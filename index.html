<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vivek Jain's vCard</title>

  <style>

  html, body {
    touch-action: manipulation;
  }

    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #667eea, #764ba2);
      overflow: hidden;
    }

    /* Background glow */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    body::before {
      background: #ff7eb3;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #65d6ce;
      bottom: -100px;
      right: -100px;
    }

    .container {
      position: relative;
      z-index: 1;

      display: flex;
      flex-direction: column;
      align-items: center;
      width: 320px;
    }

    /* 🔥 NEW CARD DESIGN */
    .card {
      width: 100%;
      padding: 20px;
      border-radius: 18px;
      text-align: center;

      background: linear-gradient(135deg, #667eea, #764ba2, #ff7eb3);
      backdrop-filter: blur(12px);

      color: white;

      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);

      position: relative;
      overflow: hidden;
    }

    /* Glow inside card */
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
    }

    .card::before {
      background: #ff7eb3;
      top: -50px;
      left: -50px;
    }

    .card::after {
      background: #65d6ce;
      bottom: -50px;
      right: -50px;
    }

    .card img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 2px solid rgba(255,255,255,0.6);
    }

    h2 {
      margin: 10px 0 5px;
    }

    .role {
      color: rgba(255,255,255,0.8);
      margin-bottom: 15px;
      font-size: 14px;
    }

    .info {
      text-align: left;
      font-size: 14px;
      color: white;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    .icon {
      width: 20px;
      text-align: center;
    }

    .text {
      flex: 1;
      line-height: 1.3;
      text-decoration: none;
      color: white;
    }

    button:hover {
      background: #5a67d8;
    }
  </style>
</head>
